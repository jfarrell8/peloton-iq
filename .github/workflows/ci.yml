name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system \
            pytest \
            pandas \
            rapidfuzz \
            pydantic-settings \
            ruff
          uv pip install --system -e "." --no-deps

      - name: Lint
        run: ruff check src/

      - name: Run tests
        run: python -m pytest tests/ -v